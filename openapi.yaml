components:
    responses:
        InternalServerError:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
            description: Internal server error.
        MethodNotAllowed:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
            description: Method not allowed.
    schemas:
        APIError:
            properties:
                message:
                    type: string
                type:
                    type: string
            required:
                - message
                - type
            type: object
        ChatCompletionRequest:
            additionalProperties: false
            properties:
                frequency_penalty:
                    type: number
                logit_bias:
                    additionalProperties: true
                    type: object
                max_tokens:
                    type: integer
                messages:
                    items:
                        additionalProperties: true
                        type: object
                    type: array
                model:
                    type: string
                "n":
                    type: integer
                presence_penalty:
                    type: number
                repeat_penalty:
                    type: number
                response_format:
                    additionalProperties: true
                    type: object
                seed:
                    type: integer
                stop:
                    oneOf:
                        - type: string
                        - items:
                            type: string
                          type: array
                stream:
                    type: boolean
                stream_options:
                    $ref: '#/components/schemas/StreamOptions'
                temperature:
                    type: number
                tool_choice:
                    oneOf:
                        - type: string
                        - additionalProperties: true
                          type: object
                tools:
                    items:
                        additionalProperties: true
                        type: object
                    type: array
                top_k:
                    type: integer
                top_p:
                    type: number
                user:
                    type: string
            required:
                - model
            type: object
        ChatCompletionResponse:
            additionalProperties: true
            description: The proxied upstream chat completion response. The server preserves the requested model name in the returned payload.
            type: object
        ErrorResponse:
            properties:
                error:
                    $ref: '#/components/schemas/APIError'
            required:
                - error
            type: object
        ModelListResponse:
            properties:
                data:
                    items:
                        $ref: '#/components/schemas/ModelObject'
                    type: array
                object:
                    example: list
                    type: string
            required:
                - object
                - data
            type: object
        ModelObject:
            properties:
                created:
                    format: int64
                    type: integer
                id:
                    type: string
                object:
                    example: model
                    type: string
                owned_by:
                    type: string
            required:
                - id
                - object
                - created
                - owned_by
            type: object
        ModelStat:
            properties:
                id:
                    type: string
                server_count:
                    type: integer
            required:
                - id
                - server_count
            type: object
        RequestHistorySection:
            properties:
                last_7_days:
                    $ref: '#/components/schemas/RequestHistoryWindow'
                last_24_hours:
                    $ref: '#/components/schemas/RequestHistoryWindow'
                last_28_days:
                    $ref: '#/components/schemas/RequestHistoryWindow'
            required:
                - last_24_hours
                - last_7_days
                - last_28_days
            type: object
        RequestHistoryWindow:
            properties:
                attempt_count:
                    format: int64
                    type: integer
                completion_tokens:
                    format: int64
                    type: integer
                failure_count:
                    format: int64
                    type: integer
                prompt_tokens:
                    format: int64
                    type: integer
                request_count:
                    format: int64
                    type: integer
                success_count:
                    format: int64
                    type: integer
                total_tokens:
                    format: int64
                    type: integer
            required:
                - request_count
                - attempt_count
                - success_count
                - failure_count
                - prompt_tokens
                - completion_tokens
                - total_tokens
            type: object
        StatsModelsSection:
            properties:
                data:
                    items:
                        $ref: '#/components/schemas/ModelStat'
                    type: array
                object:
                    example: list
                    type: string
            required:
                - object
                - data
            type: object
        StatsResponse:
            properties:
                models:
                    $ref: '#/components/schemas/StatsModelsSection'
                object:
                    example: stats
                    type: string
                request_history:
                    $ref: '#/components/schemas/RequestHistorySection'
            required:
                - object
                - models
                - request_history
            type: object
        StreamOptions:
            additionalProperties: false
            properties:
                include_usage:
                    type: boolean
            type: object
info:
    description: OpenAI-compatible endpoints backed by Black Box model discovery.
    title: Black Box API
    version: 1.0.0
openapi: 3.1.0
paths:
    /v1/chat/completions:
        post:
            operationId: createChatCompletion
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ChatCompletionRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ChatCompletionResponse'
                        text/event-stream:
                            schema:
                                type: string
                    description: Successful completion response. Streaming requests return server-sent events.
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Invalid request or no upstream server available for the requested model.
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Requested model is not available.
                "405":
                    $ref: '#/components/responses/MethodNotAllowed'
                "502":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Upstream server error.
            summary: Create a chat completion
    /v1/models:
        get:
            operationId: listModels
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ModelListResponse'
                    description: Available models.
                "405":
                    $ref: '#/components/responses/MethodNotAllowed'
                "500":
                    $ref: '#/components/responses/InternalServerError'
            summary: List available models
    /v1/stats:
        get:
            operationId: listStats
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatsResponse'
                    description: Current model and request statistics.
                "405":
                    $ref: '#/components/responses/MethodNotAllowed'
                "500":
                    $ref: '#/components/responses/InternalServerError'
            summary: Pull statistics
